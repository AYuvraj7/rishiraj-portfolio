<style>
:root{
  --bg:#020617;
  --card:#0F172A;
  --text:#E2E8F0;
  --muted:#94A3B8;
  --accent:#38BDF8;
  --border:rgba(255,255,255,0.08);
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#020617,#0F172A);
  color:var(--text);
}

.hero{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:40px;
  text-align:center;
}

.card{
  background:rgba(15,23,42,0.8);
  border:1px solid var(--border);
  backdrop-filter:blur(20px);
  padding:40px;
  border-radius:24px;
  max-width:700px;
  width:100%;
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

h1{
  font-size:48px;
  margin-bottom:10px;
}

p{
  color:var(--muted);
  line-height:1.7;
}

.btn{
  display:inline-block;
  margin-top:20px;
  padding:14px 28px;
  border-radius:14px;
  background:var(--accent);
  color:#000;
  text-decoration:none;
  font-weight:bold;
}

.glow{
  position:fixed;
  width:500px;
  height:500px;
  background:rgba(56,189,248,0.15);
  filter:blur(120px);
  top:-100px;
  right:-100px;
  z-index:-1;
}
</style>

<div class="glow"></div>

<section class="hero">
  <div class="card">
